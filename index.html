<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Enigma Final</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#07070f;
  --surface:#0f0f1c;
  --surface2:#161628;
  --gold:#c9a84c;
  --gold-dim:#8a6e2e;
  --text:#f0e8d5;
  --muted:#6b6880;
  --error:#d45c5c;
  --success:#5cb870;
  --border:rgba(201,168,76,0.15);
}

html,body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Playfair Display',serif;
  overflow-x:hidden;
}

#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}

.app{
  position:relative;z-index:1;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:5rem 1rem 2rem;
}

/* Header */
.header{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:1.1rem 2rem;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(to bottom,rgba(7,7,15,0.97) 60%,transparent);
}

.logo{
  font-family:'Playfair Display',serif;
  font-style:italic;font-size:1.05rem;
  color:var(--gold);letter-spacing:0.05em;
}

.level-indicator{
  font-family:'Courier Prime',monospace;
  font-size:0.8rem;color:var(--muted);letter-spacing:0.12em;
}

/* Progress */
.progress-wrap{
  position:fixed;top:0;left:0;right:0;
  height:2px;background:rgba(201,168,76,0.08);z-index:20;
}
.progress-bar{
  height:100%;background:var(--gold);
  transition:width 0.7s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(201,168,76,0.6);
}

/* Card */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:2px;
  padding:2.8rem 3rem;
  width:100%;max-width:660px;
  position:relative;
  box-shadow:0 24px 70px rgba(0,0,0,0.65),0 0 0 1px rgba(201,168,76,0.04);
  transition:box-shadow 0.4s;
}

.card::before{
  content:'';
  position:absolute;top:-1px;left:12%;right:12%;
  height:1px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
}

.card::after{
  content:'';
  position:absolute;bottom:-1px;left:30%;right:30%;
  height:1px;
  background:linear-gradient(to right,transparent,rgba(201,168,76,0.3),transparent);
}

/* Type badge */
.type-badge{
  font-family:'Courier Prime',monospace;
  font-size:0.68rem;letter-spacing:0.22em;
  color:var(--gold);text-transform:uppercase;
  margin-bottom:1.6rem;
  display:flex;align-items:center;gap:0.6rem;
}
.type-badge::before{
  content:'';width:22px;height:1px;background:var(--gold);flex-shrink:0;
}

/* Question */
.question{
  font-family:'Courier Prime',monospace;
  font-size:1.1rem;line-height:1.85;
  color:var(--text);
  margin-bottom:2.4rem;
  white-space:pre-line;
  min-height:4rem;
}

.cursor{
  display:inline-block;
  width:2px;height:1em;
  background:var(--gold);
  margin-left:2px;vertical-align:middle;
  animation:blink 0.9s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

/* Input row */
.input-row{
  display:flex;gap:0.7rem;
}

.answer-input{
  flex:1;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:1px;
  padding:0.9rem 1.2rem;
  color:var(--text);
  font-family:'Courier Prime',monospace;
  font-size:1rem;letter-spacing:0.12em;
  outline:none;
  transition:border-color 0.25s,box-shadow 0.25s;
  text-transform:uppercase;
}
.answer-input::placeholder{
  color:var(--muted);text-transform:none;letter-spacing:0.04em;
}
.answer-input:focus{
  border-color:rgba(201,168,76,0.4);
  box-shadow:0 0 0 3px rgba(201,168,76,0.06);
}

.submit-btn{
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold);
  padding:0.9rem 2rem;
  font-family:'Courier Prime',monospace;
  font-size:1.1rem;
  cursor:pointer;
  transition:background 0.2s,color 0.2s,box-shadow 0.2s;
  letter-spacing:0.05em;
}
.submit-btn:hover{
  background:var(--gold);color:var(--bg);
  box-shadow:0 0 24px rgba(201,168,76,0.35);
}
.submit-btn:disabled{opacity:0.4;cursor:default;}

/* Feedback */
.feedback{
  margin-top:1rem;
  font-family:'Courier Prime',monospace;
  font-size:0.82rem;letter-spacing:0.07em;
  min-height:1.3em;line-height:1.5;
  transition:color 0.3s;
}
.feedback.error{color:var(--error);}
.feedback.hint{color:var(--gold-dim);}
.feedback.success{color:var(--success);}

/* Attempts */
.attempts{
  display:flex;gap:0.45rem;margin-top:1.4rem;
  min-height:10px;
}
.dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--muted);transition:background 0.3s;
}
.dot.wrong{background:var(--error);}

/* Hint button */
.hint-btn{
  background:none;border:none;
  color:var(--muted);
  font-family:'Courier Prime',monospace;
  font-size:0.74rem;cursor:pointer;
  letter-spacing:0.1em;
  margin-top:0.8rem;padding:0;
  text-decoration:underline;text-underline-offset:3px;
  transition:color 0.2s;
  display:block;
}
.hint-btn:hover{color:var(--gold-dim);}

/* Animations */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-9px)}
  40%{transform:translateX(9px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}
.shake{animation:shake 0.38s ease;}

@keyframes slideOutLeft{
  to{transform:translateX(-70px);opacity:0;}
}
@keyframes slideInRight{
  from{transform:translateX(70px);opacity:0;}
  to{transform:translateX(0);opacity:1;}
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(22px);}
  to{opacity:1;transform:translateY(0);}
}
.slide-out{animation:slideOutLeft 0.3s ease forwards;}
.slide-in{animation:slideInRight 0.35s ease forwards;}
.fade-in-up{animation:fadeInUp 0.55s ease forwards;}

@keyframes correctGlow{
  0%{box-shadow:0 24px 70px rgba(0,0,0,0.65),0 0 0 1px rgba(201,168,76,0.04);}
  50%{box-shadow:0 24px 70px rgba(0,0,0,0.65),0 0 0 2px var(--success),0 0 50px rgba(92,184,112,0.18);}
  100%{box-shadow:0 24px 70px rgba(0,0,0,0.65),0 0 0 1px rgba(201,168,76,0.04);}
}
.correct-glow{animation:correctGlow 0.7s ease;}

/* Victory */
.victory{
  text-align:center;padding:0.5rem;
  animation:fadeInUp 0.7s ease;
}
.v-symbol{
  font-size:2.8rem;color:var(--gold);
  margin-bottom:1.4rem;
  animation:pulse 2.5s ease infinite;
}
@keyframes pulse{
  0%,100%{text-shadow:0 0 10px rgba(201,168,76,0.5);}
  50%{text-shadow:0 0 30px rgba(201,168,76,0.9),0 0 60px rgba(201,168,76,0.3);}
}
.v-label{
  font-family:'Courier Prime',monospace;
  font-size:0.7rem;letter-spacing:0.25em;
  color:var(--muted);margin-bottom:0.4rem;
}
.v-answer{
  font-family:'Playfair Display',serif;
  font-size:4.2rem;font-style:italic;
  color:var(--text);letter-spacing:0.18em;
  margin-bottom:0.3rem;
  text-shadow:0 0 40px rgba(201,168,76,0.2);
}
.v-sub{
  font-family:'Courier Prime',monospace;
  font-size:0.75rem;color:var(--gold-dim);
  letter-spacing:0.2em;margin-bottom:1.6rem;
}
.v-title{
  font-family:'Playfair Display',serif;
  font-size:2rem;color:var(--gold);
  margin-bottom:1rem;letter-spacing:0.12em;
}
.v-body{
  font-family:'Courier Prime',monospace;
  font-size:0.84rem;color:var(--muted);
  line-height:1.9;letter-spacing:0.04em;
  margin-bottom:2rem;
}

.restart-btn{
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  padding:0.75rem 2.2rem;
  font-family:'Courier Prime',monospace;
  font-size:0.78rem;letter-spacing:0.18em;
  cursor:pointer;text-transform:uppercase;
  transition:all 0.25s;
}
.restart-btn:hover{
  border-color:var(--gold-dim);color:var(--gold-dim);
}

/* Divider */
.v-divider{
  width:50px;height:1px;
  background:var(--border);
  margin:1.4rem auto;
}

/* Mobile */
@media(max-width:600px){
  .card{padding:2rem 1.4rem;}
  .question{font-size:0.98rem;}
  .v-answer{font-size:3rem;}
  .v-title{font-size:1.5rem;}
  .header{padding:0.9rem 1.2rem;}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="progress-wrap">
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<header class="header">
  <div class="logo">O Enigma Final</div>
  <div class="level-indicator" id="levelIndicator">NÍVEL 01 / 20</div>
</header>

<div class="app">
  <div class="card fade-in-up" id="card">
    <div class="type-badge" id="typeBadge"></div>
    <div class="question" id="question"></div>
    <div class="input-row" id="inputRow">
      <input class="answer-input" id="answerInput" type="text"
        placeholder="sua resposta..." autocomplete="off" spellcheck="false"/>
      <button class="submit-btn" id="submitBtn">→</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="hint-btn" id="hintBtn" style="display:none">◈ mostrar dica</button>
    <div class="attempts" id="attempts"></div>
  </div>
</div>

<script>
// ── Normalizer ──────────────────────────────────────────────────────────────
function norm(s){
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,'').trim()
    .replace(/\s+/g,' ');
}

// ── Levels ──────────────────────────────────────────────────────────────────
const levels = [
  {
    type:"ENIGMA",
    question:"Quanto mais eu falo,\nmenos eu existo.\n\nO que sou?",
    hint:"Pense no que se desfaz no momento em que você o pronuncia...",
    answers:["silencio","o silencio"],
    flavor:"O silêncio foi rompido."
  },
  {
    type:"MATEMÁTICA",
    question:"Resolva a expressão:\n\n  8 ÷ 2 × (2 + 2)  =  ?",
    hint:"Resolva o parêntese primeiro. Depois opere da esquerda para a direita.",
    answers:["16"],
    flavor:"A ordem das operações não mente."
  },
  {
    type:"SEQUÊNCIA",
    question:"Qual é o próximo número?\n\n0, 1, 1, 2, 3, 5, 8, 13, ___",
    hint:"Cada termo é a soma dos dois anteriores.",
    answers:["21"],
    flavor:"Fibonacci — a sequência da natureza."
  },
  {
    type:"LÓGICA",
    question:"Um avião cai exatamente na fronteira\nentre o Brasil e a Argentina.\n\nEm qual país os sobreviventes\nsão enterrados?",
    hint:"Leia com atenção. Uma palavra muda tudo.",
    answers:["nenhum","nenhum lugar","em nenhum","sobreviventes nao sao enterrados","nao sao enterrados","nenhum dos dois"],
    flavor:"Sobreviventes não precisam de túmulos."
  },
  {
    type:"LÓGICA",
    question:"Um homem olha para uma fotografia\ne diz:\n\n  'Não tenho irmãos nem irmãs.\n   Mas o pai desta pessoa\n   é o filho do meu pai.'\n\nDe quem é a fotografia?",
    hint:"Se ele não tem irmãos, quem é o único filho do pai dele?",
    answers:["filho","seu filho","do seu filho","do filho dele","Eu"],
    flavor:"O pai da foto é ele mesmo. A foto é do seu filho."
  },
  {
    type:"CIÊNCIA",
    question:"Na Tabela Periódica dos Elementos,\nqual elemento possui o símbolo:\n\n  Au",
    hint:"Do latim Aurum. Muito valioso.",
    answers:["ouro","gold"],
    flavor:"Aurum — o metal dos deuses."
  },
  {
    type:"LÓGICA",
    question:"Você está em um quarto\ncompletamente escuro.\nVocê tem apenas um fósforo.\nNo quarto há uma vela,\numa lareira e uma lamparina a óleo.\n\nO que você acende primeiro?",
    hint:"Sem isso, você não pode acender mais nada.",
    answers:["fosforo","o fosforo","palito","palito de fosforo","o palito","o palito de fosforo"],
    flavor:"Primeiro a ferramenta, depois a obra."
  },
  {
    type:"SEQUÊNCIA",
    question:"Qual é o próximo número?\n\n  2, 3, 5, 7, 11, 13, ___",
    hint:"Que tipo especial de número é cada um deles? Pense em divisores.",
    answers:["17"],
    flavor:"Números primos — divisíveis apenas por 1 e por si mesmos."
  },
  {
    type:"ENIGMA",
    question:"Tenho dentes,\nmas nunca mordo.\n\nO que sou?",
    hint:"Uso meus dentes para organizar cabelos.",
    answers:["pente","um pente"],
    flavor:"Os dentes que nunca ferem."
  },
  {
    type:"SEQUÊNCIA",
    question:"Qual letra completa a série?\n\n  J, F, M, A, M, J, J, ___",
    hint:"Pense no calendário. Uma letra por mês.",
    answers:["a"],
    flavor:"Janeiro · Fevereiro · ... · Agosto."
  },
  {
    type:"MATEMÁTICA",
    question:"Daqui a 3 anos, terei o dobro\nda idade que tinha há 3 anos.\n\nQuantos anos tenho hoje?",
    hint:"Chame sua idade atual de X e monte a equação.",
    answers:["9","nove"],
    flavor:"x + 3 = 2(x − 3)  →  x = 9"
  },
  {
    type:"ENIGMA",
    question:"Tenho pescoço,\nmas não tenho cabeça.\n\nO que sou?",
    hint:"Guardo líquidos dentro de mim.",
    answers:["garrafa","uma garrafa"],
    flavor:"O pescoço sem cabeça."
  },
  {
    type:"CIFRA",
    question:"Decodifique a mensagem.\n(A=1  B=2  C=3  ...  Z=26)\n\n  19 · 5 · 7 · 18 · 5 · 4 · 15",
    hint:"S=19  E=5  G=7  R=18...",
    answers:["segredo"],
    flavor:"A cifra foi decifrada."
  },
  {
    type:"SEQUÊNCIA",
    question:"Qual é a próxima letra?\n\n  O, T, T, F, F, S, S, E, N, ___",
    hint:"Pense nos números em inglês: One, Two, Three...",
    answers:["t"],
    flavor:"One·Two·Three·...·Ten."
  },
  {
    type:"PROBABILIDADE",
    question:"Em uma gaveta no escuro há\n5 meias vermelhas e 5 meias azuis,\ncompletamente misturadas.\n\nQuantas meias você deve retirar,\nno mínimo, para GARANTIR\num par de mesma cor?",
    hint:"No pior caso, as primeiras duas podem ser de cores diferentes...",
    answers:["3","tres","três"],
    flavor:"3 meias garantem ao menos 2 da mesma cor. Princípio da casa dos pombos."
  },
  {
    type:"ENIGMA",
    question:"Estou sempre à sua frente,\nmas nunca posso ser visto.\n\nO que sou?",
    hint:"Você nunca pode me alcançar, mas eu sempre chego.",
    answers:["futuro","o futuro"],
    flavor:"O futuro estava sempre na sua frente."
  },
  {
    type:"PARADOXO",
    question:"Três amigos pagam R$30 num hotel\n(R$10 cada). O gerente descobre que\no quarto custa apenas R$25 e manda\no manobrista devolver R$5.\n\nO manobrista não sabe dividir R$5\npor 3, fica com R$2 e devolve\nR$1 para cada amigo.\n\nCada amigo pagou R$9 no total.\n9 × 3 = R$27.\nMais os R$2 do manobrista = R$29.\n\nCom quem está o R$1 que falta?",
    hint:"Cuidado com o que está sendo somado. A conta R$27 + R$2 faz sentido?",
    answers:["ninguem","nenhum","nao falta","nao existe","nunca existiu","nao ha","nada","nao falta nenhum","o real nao falta","nao faltou","nao ha real faltando"],
    flavor:"R$27 − R$2 = R$25 (o quarto). Somar R$27 + R$2 não tem sentido. Nunca faltou nada."
  },
  {
    type:"LÓGICA",
    question:"Um homem mora no 20º andar.\nTodo dia desce de elevador.\nÀ noite, sobe só até o 7º andar\ne depois vai a pé.\n\nPor que faz isso?\n(responda em uma palavra)",
    hint:"Pense em alcance físico. O que ele não consegue fazer?",
    answers:["baixo","e baixo","anao","nao alcanca","pequeno","curto","nao chega"],
    flavor:"Ele não alcança o botão do 20º andar."
  },
  {
    type:"ASTRONOMIA",
    question:"Qual é o 4º planeta do\nSistema Solar, contando\na partir do Sol?",
    hint:"É chamado de 'planeta vermelho'.",
    answers:["marte"],
    flavor:"Marte — o deus romano da guerra."
  },
  {
    type:"MITOLOGIA",
    question:"Na Ilíada de Homero, um príncipe\nde Troia foi escolhido para julgar\nquem era a mais bela entre três deusas:\n\n    Hera · Atena · Afrodite\n\nSeu nome é idêntico ao de uma\ndas maiores capitais do mundo.\n\nQual é essa capital?",
    hint:"Ele escolheu Afrodite — e desencadeou a Guerra de Troia.",
    answers:["paris"],
    flavor:"PARIS."
  }
];

// ── State ────────────────────────────────────────────────────────────────────
let currentLevel = 0;
let wrongAttempts  = 0;
let isAnimating    = false;
let typeTimeout    = null;
let hintShown      = false;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const card         = document.getElementById('card');
const typeBadge    = document.getElementById('typeBadge');
const questionEl   = document.getElementById('question');
const answerInput  = document.getElementById('answerInput');
const submitBtn    = document.getElementById('submitBtn');
const feedback     = document.getElementById('feedback');
const hintBtn      = document.getElementById('hintBtn');
const attemptsEl   = document.getElementById('attempts');
const progressBar  = document.getElementById('progressBar');
const levelInd     = document.getElementById('levelIndicator');

// ── Typewriter ────────────────────────────────────────────────────────────────
function typewriter(el, text, speed){
  if(typeTimeout) clearTimeout(typeTimeout);
  el.innerHTML = '';
  let i = 0;
  const cur = document.createElement('span');
  cur.className = 'cursor';
  el.appendChild(cur);
  function tick(){
    if(i < text.length){
      el.insertBefore(document.createTextNode(text[i]), cur);
      i++;
      typeTimeout = setTimeout(tick, speed);
    } else {
      cur.remove();
    }
  }
  tick();
}

// ── Render level ──────────────────────────────────────────────────────────────
function renderLevel(animate){
  if(currentLevel >= levels.length){ showVictory(); return; }

  const lvl = levels[currentLevel];
  wrongAttempts = 0;
  hintShown = false;

  const n = String(currentLevel+1).padStart(2,'0');
  levelInd.textContent = `NÍVEL ${n} / ${levels.length}`;
  progressBar.style.width = Math.max((currentLevel/levels.length)*100, 1) + '%';

  typeBadge.textContent = lvl.type;
  answerInput.value = '';
  feedback.textContent = '';
  feedback.className = 'feedback';
  hintBtn.style.display = 'none';
  attemptsEl.innerHTML = '';

  if(animate){
    card.classList.add('slide-in');
    card.addEventListener('animationend', ()=> card.classList.remove('slide-in'), {once:true});
  }

  setTimeout(()=>{
    typewriter(questionEl, lvl.question, 16);
    answerInput.focus();
  }, animate ? 80 : 10);
}

// ── Check answer ──────────────────────────────────────────────────────────────
function checkAnswer(){
  if(isAnimating) return;
  const val = answerInput.value.trim();
  if(!val) return;

  const lvl = levels[currentLevel];
  const n   = norm(val);
  const ok  = lvl.answers.some(a => norm(a) === n);

  if(ok){
    isAnimating = true;
    answerInput.disabled = true;
    submitBtn.disabled   = true;
    feedback.textContent = '✓  ' + lvl.flavor;
    feedback.className   = 'feedback success';
    card.classList.add('correct-glow');

    progressBar.style.width = ((currentLevel+1)/levels.length*100) + '%';

    setTimeout(()=>{
      card.classList.remove('correct-glow');
      card.classList.add('slide-out');
      card.addEventListener('animationend', ()=>{
        card.classList.remove('slide-out');
        answerInput.disabled = false;
        submitBtn.disabled   = false;
        currentLevel++;
        isAnimating = false;
        renderLevel(true);
      },{once:true});
    }, 950);

  } else {
    wrongAttempts++;
    card.classList.add('shake');
    card.addEventListener('animationend', ()=> card.classList.remove('shake'), {once:true});

    // Dots
    attemptsEl.innerHTML = '';
    for(let i=0;i<Math.min(wrongAttempts,6);i++){
      const d = document.createElement('div');
      d.className = 'dot wrong';
      attemptsEl.appendChild(d);
    }

    feedback.textContent = wrongAttempts >= 4
      ? '✗  Resposta incorreta. Confira a dica abaixo.'
      : '✗  Resposta incorreta.';
    feedback.className = 'feedback error';

    if(wrongAttempts >= 2 && !hintShown){
      hintBtn.style.display = 'block';
    }
    answerInput.select();
  }
}

hintBtn.addEventListener('click', ()=>{
  const lvl = levels[currentLevel];
  feedback.textContent = '◈  ' + lvl.hint;
  feedback.className   = 'feedback hint';
  hintShown = true;
  hintBtn.style.display = 'none';
});

submitBtn.addEventListener('click', checkAnswer);
answerInput.addEventListener('keydown', e=>{ if(e.key==='Enter') checkAnswer(); });

// ── Victory ───────────────────────────────────────────────────────────────────
function showVictory(){
  progressBar.style.width = '100%';
  levelInd.textContent = '✦  CONCLUÍDO';

  card.innerHTML = `
    <div class="victory">
      <p style="font-family:'Courier Prime',monospace;font-size:1rem;color:var(--text);letter-spacing:0.08em;">Enigma final: "FR1860 29 May 26 19:15"</p>
    </div>
  `;

  document.getElementById('restartBtn').addEventListener('click', restart);
}

// ── Restart ───────────────────────────────────────────────────────────────────
function restart(){
  currentLevel = 0;
  wrongAttempts = 0;
  isAnimating = false;
  hintShown = false;

  card.innerHTML = `
    <div class="type-badge" id="typeBadge"></div>
    <div class="question" id="question"></div>
    <div class="input-row">
      <input class="answer-input" id="answerInput" type="text"
        placeholder="sua resposta..." autocomplete="off" spellcheck="false"/>
      <button class="submit-btn" id="submitBtn">→</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="hint-btn" id="hintBtn" style="display:none">◈ mostrar dica</button>
    <div class="attempts" id="attempts"></div>
  `;

  // Re-bind DOM refs
  Object.assign(window, {
    typeBadge:   document.getElementById('typeBadge'),
    questionEl:  document.getElementById('question'),
    answerInput: document.getElementById('answerInput'),
    submitBtn:   document.getElementById('submitBtn'),
    feedback:    document.getElementById('feedback'),
    hintBtn:     document.getElementById('hintBtn'),
    attemptsEl:  document.getElementById('attempts'),
  });

  document.getElementById('submitBtn').addEventListener('click', checkAnswer);
  document.getElementById('answerInput').addEventListener('keydown', e=>{ if(e.key==='Enter') checkAnswer(); });
  document.getElementById('hintBtn').addEventListener('click', ()=>{
    const lvl = levels[currentLevel];
    feedback.textContent = '◈  ' + lvl.hint;
    feedback.className   = 'feedback hint';
    hintShown = true;
    hintBtn.style.display = 'none';
  });

  card.classList.add('fade-in-up');
  card.addEventListener('animationend', ()=> card.classList.remove('fade-in-up'), {once:true});

  renderLevel(false);
}

// ── Canvas particles ──────────────────────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];

function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initParticles(){
  particles = Array.from({length:55}, ()=>({
    x:  Math.random() * canvas.width,
    y:  Math.random() * canvas.height,
    r:  Math.random() * 1.4 + 0.3,
    vx: (Math.random()-.5) * 0.18,
    vy: (Math.random()-.5) * 0.18,
    o:  Math.random() * 0.35 + 0.07
  }));
}

function drawParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(const p of particles){
    p.x += p.vx; p.y += p.vy;
    if(p.x<0) p.x=canvas.width;
    if(p.x>canvas.width) p.x=0;
    if(p.y<0) p.y=canvas.height;
    if(p.y>canvas.height) p.y=0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(201,168,76,${p.o})`;
    ctx.fill();
  }
  requestAnimationFrame(drawParticles);
}

window.addEventListener('resize', ()=>{ resize(); initParticles(); });
resize(); initParticles(); drawParticles();

// ── Init ──────────────────────────────────────────────────────────────────────
renderLevel(false);
</script>
